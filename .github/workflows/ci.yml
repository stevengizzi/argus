name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # DEF-181: pins bumped to Node-24-compatible majors (2026-04-23).
      # checkout@v6, setup-python@v6, setup-node@v6 all run on Node 24.
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install dependencies from lockfile
        # DEF-180: install from requirements-dev.lock so CI gets a
        # byte-reproducible dependency tree. The editable install uses
        # --no-deps so the lockfile is authoritative.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run pytest
        env:
          # Tests that read env vars during import-time (AIConfig, ApiConfig)
          # expect these to be absent or deterministic under -n auto.
          ANTHROPIC_API_KEY: ""
          ARGUS_JWT_SECRET: "ci-test-secret-do-not-use-in-prod"
        run: |
          python -m pytest --ignore=tests/test_main.py -n auto -q -m "not integration"

  vitest:
    name: vitest (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: argus/ui
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: argus/ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test
