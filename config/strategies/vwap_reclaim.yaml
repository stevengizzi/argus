strategy_id: "strat_vwap_reclaim"
name: "VWAP Reclaim"
version: "1.0.0"
enabled: true
asset_class: "us_stocks"
pipeline_stage: "paper_trading"
family: "mean_reversion"
description_short: "Enters long when a gapping stock pulls back below VWAP, then reclaims above on volume."
time_window_display: "10:00 AM–12:00 PM"

operating_window:
  earliest_entry: "10:00"
  latest_entry: "12:00"
  force_close: "15:50"

min_pullback_pct: 0.002
max_pullback_pct: 0.02
min_pullback_bars: 3
volume_confirmation_multiplier: 1.2
max_chase_above_vwap_pct: 0.003
target_1_r: 1.0
target_2_r: 2.0
time_stop_minutes: 30
stop_buffer_pct: 0.001

risk_limits:
  max_loss_per_trade_pct: 0.01
  max_daily_loss_pct: 0.03
  max_trades_per_day: 8
  max_concurrent_positions: 3

benchmarks:
  min_win_rate: 0.45
  min_profit_factor: 1.1
  min_sharpe: 0.3
  max_drawdown_pct: 0.12

backtest_summary:
  status: "walk_forward_complete"
  wfe_pnl: null
  oos_sharpe: 1.49
  total_trades: 59556
  data_months: 35
  last_run: "2026-02-26"

# Universe filter for strategy-specific symbol filtering (Sprint 23)
# VWAP Reclaim is a mean-reversion strategy that benefits from:
# - Mid-to-large cap stocks where VWAP is meaningful with institutional flow
# - Higher liquidity for clean VWAP behavior
universe_filter:
  min_price: 10.0
  max_price: 200.0
  min_market_cap: 500000000  # 500M - mid-cap minimum for institutional flow
  min_avg_volume: 1000000
