strategy_id: "strat_orb_scalp"
name: "ORB Scalp"
version: "1.0.0"
enabled: true
mode: live  # "live" or "shadow" (Sprint 27.7)
# VIX regime dimensions: not yet constrained (match-any). Activate post-Sprint 28.
asset_class: "us_stocks"
pipeline_stage: "paper_trading"
family: "orb_family"
description_short: "Quick 0.3R scalp on the same opening range breakout pattern, exiting within 120 seconds."
time_window_display: "9:45–11:30 AM"

risk_limits:
  max_loss_per_trade_pct: 0.01
  max_daily_loss_pct: 0.03
  max_consecutive_losses_pause: 5
  max_trades_per_day: 12
  max_concurrent_positions: 0

operating_window:
  earliest_entry: "09:45"  # 10 min after ORB (5-min OR window)
  latest_entry: "11:30"
  force_close: "15:50"
  active_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]

benchmarks:
  min_win_rate: 0.55  # Higher win rate target for scalping
  min_avg_r_multiple: 0.25  # Lower R (0.3R target)
  min_profit_factor: 1.2
  min_sharpe_ratio: 0.3
  max_drawdown_pct: 0.15

# Strategy-specific parameters (DEC-123)
orb_window_minutes: 5
scalp_target_r: 0.3
max_hold_seconds: 120
stop_placement: "midpoint"
min_range_atr_ratio: 0.5
max_range_atr_ratio: 999.0
chase_protection_pct: 0.005
breakout_volume_multiplier: 1.5
volume_threshold_rvol: 2.0

backtest_summary:
  status: "databento_preliminary"
  data_source: "databento_ohlcv_1m"
  universe_size: 28
  universe_note: "Curated large-cap universe; full-universe re-validation pending"
  oos_sharpe: -5.33
  wfe_pnl: -0.35
  total_trades: 390
  avg_win_rate: 0.471
  avg_profit_factor: 0.71
  data_range: "2023-04-01 to 2025-03-01"
  data_months: 23
  last_run: "2026-03-23"
  prior_baseline:
    source: "alpaca_provisional"
    oos_sharpe: null
    wfe_pnl: null
    total_trades: 20880

# Universe filter for strategy-specific symbol filtering (Sprint 23)
# Values extracted from get_scanner_criteria() in orb_base.py
universe_filter:
  min_price: 10.0        # Avoid penny stocks with erratic behavior
  max_price: 200.0       # Focus on liquid mid-range stocks
  min_avg_volume: 1000000  # Scalping needs high liquidity for fast fills
