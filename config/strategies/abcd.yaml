strategy_id: "strat_abcd"
name: "ABCD"
version: "1.0.0"
enabled: true
mode: shadow  # Demoted Sprint 32.9 — 567 trades at 21.9% win rate. Evaluate for promotion after parameter optimization via Experiment Pipeline.
asset_class: "us_stocks"
pipeline_stage: "exploration"
family: "harmonic"
description_short: "ABCD harmonic measured-move: CD leg mirrors AB with Fibonacci retracement at B and C."
time_window_display: "10:00 AM-3:00 PM"
operating_window:
  earliest_entry: "10:00"
  latest_entry: "15:00"
  force_close: "15:50"
# Pattern detection parameters (delegated to ABCDPattern defaults)
target_1_r: 1.0
target_2_r: 2.0
time_stop_minutes: 60
allowed_regimes:
  - bullish_trending
  - bearish_trending
  - range_bound
  - high_volatility
risk_limits:
  max_loss_per_trade_pct: 0.01
  max_daily_loss_pct: 0.03
  max_trades_per_day: 6
  max_concurrent_positions: 0
benchmarks:
  min_win_rate: 0.45
  min_profit_factor: 1.1
  min_sharpe: 0.3
  max_drawdown_pct: 0.12
backtest_summary:
  status: "pending"
  data_source: null
  universe_size: null
  universe_note: null
  oos_sharpe: null
  wfe_pnl: null
  total_trades: null
  avg_win_rate: null
  avg_profit_factor: null
  data_range: null
  data_months: null
  last_run: null
  prior_baseline: null
universe_filter:
  min_price: 10.0
  max_price: 300.0
  min_avg_volume: 500000
exit_management:
  trailing_stop:
    enabled: true
    type: "atr"
    atr_multiplier: 2.5
    activation: "after_profit_pct"
    activation_profit_pct: 0.005
  escalation:
    enabled: true
    phases:
      - elapsed_pct: 0.67
        stop_to: "breakeven"
      - elapsed_pct: 1.0
        stop_to: "half_profit"
