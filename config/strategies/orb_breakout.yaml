strategy_id: "strat_orb_breakout"
name: "ORB Breakout"
version: "1.0.0"
enabled: true
mode: live  # "live" or "shadow" (Sprint 27.7)
# VIX regime dimensions intentionally unconstrained (match-any). Use the optional
# operating_conditions: block to gate by VIX regime when needed (Sprint 27.9).
# allowed_regimes: above is the primary regime gate (FIX-19, audit 2026-04-21).
asset_class: "us_stocks"
pipeline_stage: "paper_trading"
family: "orb_family"
description_short: "Exploits gapping stocks breaking out of the first 5 minutes' high with volume confirmation."
time_window_display: "9:35–11:30 AM"

risk_limits:
  max_loss_per_trade_pct: 0.01
  max_daily_loss_pct: 0.03
  max_consecutive_losses_pause: 5
  max_trades_per_day: 6
  max_concurrent_positions: 0

operating_window:
  earliest_entry: "09:35"
  latest_entry: "11:30"
  force_close: "15:50"
  active_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]

benchmarks:
  min_win_rate: 0.45
  min_avg_r_multiple: 0.6
  min_profit_factor: 1.3
  min_sharpe_ratio: 0.5
  max_drawdown_pct: 0.15

# Strategy-specific parameters (not validated by base StrategyConfig —
# will be validated by OrbBreakoutConfig which extends StrategyConfig)
# Updated 2026-02-17: Sprint 10 optimization — or=5, hold=15, atr=999 (DEC-076)
# Updated 2026-02-18: earliest_entry 09:45→09:35 to match or=5 window (DEC-078)
orb_window_minutes: 5
stop_placement: "midpoint"
volume_threshold_rvol: 2.0
target_1_r: 1.0
target_2_r: 2.0
time_stop_minutes: 15
min_range_atr_ratio: 0.5
max_range_atr_ratio: 999.0
chase_protection_pct: 0.005
breakout_volume_multiplier: 1.5

backtest_summary:
  status: "databento_preliminary"
  data_source: "databento_ohlcv_1m"
  universe_size: 28
  universe_note: "Curated large-cap universe; full-universe re-validation pending"
  oos_sharpe: -2.62
  wfe_pnl: -0.27
  total_trades: 290
  avg_win_rate: 0.471
  avg_profit_factor: 0.77
  data_range: "2023-04-01 to 2025-03-01"
  data_months: 23
  last_run: "2026-03-23"
  prior_baseline:
    source: "alpaca_provisional"
    oos_sharpe: 0.34
    wfe_pnl: 0.56
    total_trades: 137

# Universe filter for strategy-specific symbol filtering (Sprint 23)
# Values extracted from get_scanner_criteria() in orb_base.py
universe_filter:
  min_price: 10.0        # Avoid penny stocks with erratic behavior
  max_price: 200.0       # Focus on liquid mid-range stocks
  min_avg_volume: 1000000  # Momentum stocks need liquidity for clean breakouts
