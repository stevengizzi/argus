strategy_id: "strat_dip_and_rip"
name: "Dip-and-Rip"
version: "1.0.0"
enabled: true
mode: live  # "live" or "shadow" (Sprint 27.7)
asset_class: "us_stocks"
pipeline_stage: "exploration"
family: "reversal"
description_short: "Sharp intraday dip followed by rapid recovery with volume confirmation."
time_window_display: "9:45 AM–11:30 AM"
operating_window:
  earliest_entry: "09:45"
  latest_entry: "11:30"
  force_close: "15:50"
# Pattern detection parameters
dip_lookback: 10
min_dip_percent: 0.02
max_dip_bars: 5
min_recovery_percent: 0.50
max_recovery_bars: 8
max_recovery_ratio: 1.5
entry_threshold_percent: 0.60
min_recovery_volume_ratio: 1.3
stop_buffer_atr_mult: 0.3
target_ratio: 1.5
target_1_r: 1.5
target_2_r: 2.5
time_stop_minutes: 30
risk_limits:
  max_loss_per_trade_pct: 0.01
  max_daily_loss_pct: 0.03
  max_trades_per_day: 6
  max_concurrent_positions: 0
benchmarks:
  min_win_rate: 0.45
  min_profit_factor: 1.1
  min_sharpe_ratio: 0.3
  max_drawdown_pct: 0.12
backtest_summary:
  status: "pending"
  data_source: null
  universe_size: null
  universe_note: null
  oos_sharpe: null
  wfe_pnl: null
  total_trades: null
  avg_win_rate: null
  avg_profit_factor: null
  data_range: null
  data_months: null
  last_run: null
  prior_baseline: null
universe_filter:
  min_price: 5.0
  max_price: 200.0
  min_avg_volume: 500000
  min_relative_volume: 1.5
exit_management:
  trailing_stop:
    enabled: true
    type: "atr"
    atr_multiplier: 1.5
    activation: "after_profit_pct"
    activation_profit_pct: 0.005
  escalation:
    enabled: true
    phases:
      - elapsed_pct: 0.67
        stop_to: "breakeven"
      - elapsed_pct: 1.0
        stop_to: "half_profit"
