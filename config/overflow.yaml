# Overflow Management (Sprint 27.95)
# Routes excess signals to counterfactual tracking when broker position capacity is reached.
# Config-gated: set enabled: false to disable entirely (zero overhead).
#
# Standalone overlay convention (DEC-384, FIX-02 audit 2026-04-21):
# Bare fields at top level (no `overflow:` wrapper). The section_key in
# _STANDALONE_SYSTEM_OVERLAYS ("overflow") tells load_config() which top-level
# key of the system config this file overlays. This file is authoritative;
# neither system.yaml nor system_live.yaml carries an `overflow:` block.
enabled: true
broker_capacity: 50
