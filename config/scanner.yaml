# Scanner Configuration
# Controls pre-market stock selection
# scanner_type: "fmp" | "databento" | "alpaca" | "static"
# "fmp" uses Financial Modeling Prep REST API (DEC-258, Sprint 21.7)
# "static" used for replay/backtest; "databento"/"alpaca" retained for fallback
scanner_type: "fmp"

# Static scanner symbols (fallback for all scanner types when API fails)
static_symbols:
  - "AAPL"
  - "MSFT"
  - "NVDA"
  - "TSLA"
  - "AMD"
  - "AMZN"
  - "META"
  - "GOOGL"

# FMP scanner configuration (used when scanner_type = "fmp")
# `min_volume` removed by FIX-16 (audit 2026-04-21, H2-S10) — field was
# always ignored (FMP endpoints do not return volume). Restore when an
# FMP volume-aware endpoint is wired (Sprint 23+).
fmp_scanner:
  min_price: 10.0
  max_price: 500.0
  max_symbols_returned: 15
  fallback_symbols:
    - "AAPL"
    - "MSFT"
    - "NVDA"
    - "TSLA"
    - "AMD"
    - "AMZN"
    - "META"
    - "GOOGL"

# Alpaca scanner configuration (used when scanner_type = "alpaca")
alpaca_scanner:
  universe_source: "config"  # Use universe_symbols list
  universe_symbols:
    - "AAPL"
    - "MSFT"
    - "NVDA"
    - "TSLA"
    - "AMD"
    - "AMZN"
    - "META"
    - "GOOGL"
    - "NFLX"
    - "SPY"
  min_price: 5.0
  max_price: 500.0
  min_volume_yesterday: 1000000
  max_symbols_returned: 10

# Databento scanner configuration (used when scanner_type = "databento")
databento_scanner:
  universe_symbols:
    - "AAPL"
    - "MSFT"
    - "NVDA"
    - "TSLA"
    - "AMD"
    - "AMZN"
    - "META"
    - "GOOGL"
    - "NFLX"
    - "SPY"
  min_gap_pct: 0.02
  min_price: 10.0
  max_price: 500.0
  min_volume: 1000000
  max_symbols_returned: 10
  dataset: "EQUS.MINI"  # DEC-237: Consolidated US equities (Nasdaq + NYSE)
