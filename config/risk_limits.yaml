account:
  # PAPER TRADING: Set to 1.0 (100%) to maximize data capture. Restore to 0.03/0.05 before live trading.
  daily_loss_limit_pct: 1.0
  weekly_loss_limit_pct: 1.0
  cash_reserve_pct: 0.20
  max_concurrent_positions: 50
  emergency_shutdown_enabled: true
  # Minimum position risk floor — positions below this are rejected as "not worth taking"
  # Replaces ratio-based 0.25R floor (DEC-250)
  # PAPER TRADING: Reduced from 100.0 to 10.0 to prevent rejection storms with small positions.
  # Restore to 100.0 before going live.
  min_position_risk_dollars: 10.0

cross_strategy:
  max_single_stock_pct: 0.05
  max_single_sector_pct: 0.15
  duplicate_stock_policy: "priority_by_win_rate"

pdt:
  enabled: true
  account_type: "margin"
  threshold_balance: 25000  # FINRA regulatory minimum for unlimited day trading
