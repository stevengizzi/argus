account:
  daily_loss_limit_pct: 0.03
  weekly_loss_limit_pct: 0.05
  cash_reserve_pct: 0.20
  max_concurrent_positions: 10
  emergency_shutdown_enabled: true
  # Minimum position risk floor — positions below this are rejected as "not worth taking"
  # Replaces ratio-based 0.25R floor (DEC-250)
  min_position_risk_dollars: 100.0

cross_strategy:
  max_single_stock_pct: 0.05
  max_single_sector_pct: 0.15
  duplicate_stock_policy: "priority_by_win_rate"

pdt:
  enabled: true
  account_type: "margin"
  threshold_balance: 25000  # FINRA regulatory minimum for unlimited day trading
