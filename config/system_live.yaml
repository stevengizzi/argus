# Argus System Configuration — LIVE MODE
# Uses Databento (market data) + IBKR (execution)
#
# Usage: python -m argus.main --config config/system_live.yaml
#
# IMPORTANT: This is for live integration testing. IBKR is configured for
# PAPER TRADING (port 4002). Do NOT change to port 4001 without explicit
# confirmation from the operator.

timezone: "America/New_York"
market_open: "09:30"
market_close: "16:00"
log_level: "INFO"
heartbeat_interval_seconds: 60
data_dir: "data"

# Data source: "databento" for live market data (DEC-082)
data_source: "databento"

# Broker source: "ibkr" for IBKR paper trading (DEC-083)
broker_source: "ibkr"

# Interactive Brokers configuration (Sprint 13 — production execution)
# See DEC-083: IBKR Pro for live execution, no PFOF
ibkr:
  # Connection settings — IB Gateway on localhost
  host: "127.0.0.1"
  port: 4002  # 4001=live, 4002=paper. USE 4002 FOR PAPER TRADING.
  client_id: 1
  account: ""  # IBKR account ID — auto-detected from connection
  timeout_seconds: 30.0
  readonly: false

  # Reconnection settings
  reconnect_max_retries: 10
  reconnect_base_delay_seconds: 1.0
  reconnect_max_delay_seconds: 60.0

  # Operational safety — IBKR limit is 50 orders/sec, leave headroom
  max_order_rate_per_second: 45.0

  # Bracket OCA grouping (Sprint 31.91 Session 1a — DEF-204 fix).
  # 1 = "Cancel with block" (atomic cancellation when one OCA member fills);
  # 0 = no OCA (pre-Sprint-31.91 behavior). ocaType=2 is rejected by Pydantic.
  # Switching from 1 to 0 is RESTART-REQUIRED — see live-operations.md.
  bracket_oca_type: 1

health:
  heartbeat_interval_seconds: 60
  heartbeat_url_env: "HEALTHCHECKS_PING_URL"
  alert_webhook_url_env: "DISCORD_WEBHOOK_URL"
  daily_check_enabled: true
  weekly_reconciliation_enabled: true

# Command Center API (Sprint 14 — DEC-099)
api:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  password_hash: "$2b$12$Qs2VsacIbZZhDwtA50vQ8eqnJtihmK8AOisBqpwPRPxXMH2MiCsdC"  # "argus"
  jwt_secret_env: "ARGUS_JWT_SECRET"
  jwt_expiry_hours: 24
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "http://localhost:5175"
  ws_heartbeat_interval_seconds: 30
  ws_tick_throttle_ms: 1000

# Goal tracking (Sprint 21d — DEC-214)
goals:
  monthly_target_usd: 5000

# AI Copilot configuration (Sprint 22 — AI Layer MVP)
# API key: Set ANTHROPIC_API_KEY environment variable
ai:
  model: "claude-opus-4-5-20251101"       # DEC-098: Claude Opus for all API calls
  system_prompt_token_budget: 1500        # Max tokens for system prompt
  page_context_token_budget: 2000         # Max tokens for page-specific context
  history_token_budget: 8000              # Max tokens for conversation history
  rate_limit_requests_per_minute: 20      # Claude API rate limit
  proposal_ttl_seconds: 300               # Action proposal expiry (5 minutes)
  insight_refresh_interval_seconds: 60    # Dashboard insight refresh interval
  cost_per_million_input_tokens: 15.0     # Opus pricing
  cost_per_million_output_tokens: 75.0    # Opus pricing

# NLP Catalyst Pipeline (Sprint 23.5 — DEC-164)
# Ingests news/filings from SEC EDGAR, FMP, Finnhub.
# Classifies catalyst quality via Claude API.
# Requires: FINNHUB_API_KEY, FMP_API_KEY, ANTHROPIC_API_KEY
catalyst:
  enabled: true
  polling_interval_premarket_seconds: 900   # 15 minutes
  polling_interval_session_seconds: 1800    # 30 minutes
  max_batch_size: 20
  daily_cost_ceiling_usd: 5.0              # DEC-303: $5/day cost ceiling
  classification_cache_ttl_hours: 24
  dedup_window_minutes: 30
  sources:
    sec_edgar:
      enabled: true
      filing_types:
        - "8-K"
        - "4"
      user_agent_email: "gizzimusic@gmail.com"     # Required: your email for SEC fair access
      rate_limit_per_second: 10.0
    fmp_news:
      enabled: false
      api_key_env_var: "FMP_API_KEY"
      endpoints:
        - "stock_news"
        - "press_releases"
    finnhub:
      enabled: true
      api_key_env_var: "FINNHUB_API_KEY"
      rate_limit_per_minute: 60
  briefing:
    model: null             # null inherits from ai.model (Claude Opus)
    max_symbols: 30

# Quality Engine (Sprint 24 — Setup Quality + Dynamic Sizer)
# Scores trade setups across 5 dimensions, maps grades to risk tiers.
# NOTE: Thresholds are PROVISIONAL — recalibrate after Sprint 28
# when historical match has real data.
quality_engine:
  enabled: true
  weights:
    pattern_strength: 0.30
    catalyst_quality: 0.25
    volume_profile: 0.20
    historical_match: 0.15
    regime_alignment: 0.10
  thresholds:
    a_plus: 90
    a: 80
    a_minus: 70
    b_plus: 60
    b: 50
    b_minus: 40
    c_plus: 30
  # PAPER TRADING: Risk tiers reduced 10x from live values.
  # Restore to live values before going live.
  risk_tiers:
    a_plus: [0.002, 0.003]
    a: [0.0015, 0.002]
    a_minus: [0.001, 0.0015]
    b_plus: [0.00075, 0.001]
    b: [0.0005, 0.00075]
    b_minus: [0.00025, 0.0005]
    c_plus: [0.00025, 0.00025]
  min_grade_to_trade: "C+"

# Universe Manager (Sprint 23 — DEC-263)
# Broad-universe monitoring with strategy-specific filtering
# Set enabled: true to activate. Requires FMP_API_KEY.
universe_manager:
  enabled: true          # Start disabled — operator activates when ready
  min_price: 5.0          # System-level: exclude penny stocks
  max_price: 10000.0      # System-level: exclude extreme price outliers
  min_avg_volume: 100000  # System-level: minimum average daily volume
  exclude_otc: true       # System-level: exclude OTC symbols
  reference_cache_ttl_hours: 72  # FMP reference data cache lifetime
  fmp_batch_size: 50      # Symbols per FMP batch API call
  trust_cache_on_startup: true  # Load cache immediately; refresh stale in background (DEC-362)

# VIX Regime Intelligence (Sprint 27.9)
# Authoritative config is config/vix_regime.yaml (standalone overlay via
# DEC-384 / FIX-16 audit 2026-04-21). Do NOT re-add a `vix_regime:` block
# here; it would diverge from the standalone file.

# Counterfactual Engine (Sprint 27.7)
# Shadow-tracks rejected signals to measure filter accuracy.
counterfactual:
  enabled: true
  retention_days: 90
  no_data_timeout_seconds: 300
  eod_close_time: "16:00"

# Overflow Management (Sprint 27.95) — authoritative config is config/overflow.yaml
# (standalone overlay via DEC-384 / FIX-02 audit 2026-04-21). Do NOT re-add an
# `overflow:` block here; it would diverge from the standalone file.

# Controls handling of unknown IBKR positions found at startup.
startup:
  flatten_unknown_positions: true  # Sell unknown IBKR positions at startup

# Reconciliation (Sprint 27.8 + 27.95 — Ghost Position Fix)
reconciliation:
  auto_cleanup_orphans: true
  auto_cleanup_unconfirmed: true
  consecutive_miss_threshold: 3
  # Sprint 31.91 Session 2b.1 (D5): emit phantom_short + stranded_broker_long
  # alerts on broker-orphan detection. Always true in production.
  broker_orphan_alert_enabled: true
  # Sprint 31.91 Session 2c.1: per-symbol entry gate on phantom_short
  # detection. State is persisted to data/operations.db and rehydrated
  # on startup before OrderApprovedEvent subscription (M5 ordering).
  # When False, the alert still fires but no entries are blocked.
  broker_orphan_entry_gate_enabled: true
  # Sprint 31.91 Session 2c.2 (M4): consecutive reconciliation cycles
  # observing broker-non-short before the phantom_short gate auto-clears.
  # Default 5 (~5 minutes) per M4 cost-of-error asymmetry — false-clear
  # is more dangerous than false-hold. Range 1-60.
  broker_orphan_consecutive_clear_threshold: 5
  # Sprint 31.91 Session 2d (L3 + L15): aggregate startup-alert threshold.
  # When >= this many symbols are gated at startup (rehydrated from
  # data/operations.db), an aggregate phantom_short_startup_engaged alert
  # fires ALONGSIDE per-symbol phantom_short alerts. Per-symbol alerts
  # always fire — the threshold only gates the aggregate. High-volume
  # operators may raise to 20+ to reduce noise; low-volume operators
  # (steady state post-fix) may lower to 5 to catch resurgence early.
  phantom_short_aggregate_alert_threshold: 10

# Observatory (Sprint 25 — The Observatory)
# Immersive pipeline visualization page for operational visibility.
observatory:
  enabled: true
  ws_update_interval_ms: 1000       # WebSocket push interval (ms)
  timeline_bucket_seconds: 60       # Timeline view event bucketing (seconds)
  matrix_max_rows: 100              # Maximum rows in Matrix view
  debrief_retention_days: 7         # Days of historical data for Debrief mode


# Historical Query Service (Sprint 31A.5 — DuckDB Parquet layer)
# Authoritative config is config/historical_query.yaml (standalone overlay
# via DEC-384 / FIX-16 audit 2026-04-21). Do NOT re-add a `historical_query:`
# block here; it would diverge from the standalone file.

# Alert Observability (Sprint 31.91 D9a — DEF-014)
# HealthMonitor SystemAlertEvent consumer + REST surface. Per-alert-type
# acknowledgment-required gating lives in alert_auto_resolution.POLICY_TABLE
# (operator_ack_required field). DEF-220 (resolved S5c) removed the redundant
# acknowledgment_required_severities field that had no consumer.
alerts: {}
