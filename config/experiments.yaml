# Experiment Pipeline Configuration
# Enabled Sprint 32.9. Variants added Sprint 31A after parameter sweep.
enabled: true
auto_promote: false  # When true, PromotionEvaluator runs autonomously at session end
max_variants_per_pattern: 8  # Caps total variants per pattern (shadow + live)
backtest_min_trades: 20
backtest_min_expectancy: 0.0
promotion_min_shadow_days: 5
promotion_min_shadow_trades: 30
promotion_query_limit: 1000  # Max records fetched from counterfactual/trade store during evaluation
cache_dir: "data/databento_cache"
max_workers: 4

# Variant definitions — each pattern can have multiple named variants.
# Variants not defined here use the base strategy config only.
#
# Shadow expansion (Sprint 31.75 S4): Added 18 variants across 8 patterns
# for immediate shadow data collection. Configs chosen based on:
# - April 3-5 small-sample sweep results (directional signals)
# - Domain knowledge of pattern mechanics
# - DEF-152/154 fixes enabling previously-broken patterns
# Validation model: shadow performance is the promotion gate, not backtests.
# CounterfactualTracker data over 20+ trading days determines promotion.
#
# Sprint 31A sweep methodology:
# - 24 representative momentum symbols (AAPL, NVDA, AMD, TSLA, MARA, RIOT, COIN, HOOD,
#   GME, AMC, SPCE, PLUG, SNAP, UBER, PLTR, RBLX, AFRM, SOFI, LCID, RIVN, NIO, SMCI,
#   IONQ, HIMS); full 2025 calendar year (2025-01-01 to 2025-12-31).
# - Sweeps used build_pattern_from_config() to correctly wire config overrides to pattern
#   constructors (BacktestEngine default behavior instantiates patterns with no-arg defaults).
# - Selection criteria: trades >= 30, expectancy > 0, Sharpe > 0.5.
# - Omitted patterns (defaults failed all criteria or no variant improved over defaults):
#   bull_flag (best Sharpe -3.295, negative exp across all params),
#   flat_top_breakout (best Sharpe -2.855, negative exp),
#   hod_break (positive exp but < 30 trades in all qualifying configs),
#   gap_and_go (< 30 trades with positive exp on this symbol set),
#   abcd (Sharpe 1.018 achievable but expectancy remains negative).
#
# Sprint 31A S6 sweep — S3–S5 patterns (micro_pullback, vwap_bounce, narrow_range_breakout):
# NOTE: Cache grew from 24 symbols to 24,321 symbols between S1–S5 sweeps and S6.
# BacktestEngine auto-detects symbols from cache; no --symbols flag exists in the CLI.
# Each grid point takes ~40 min on the full cache vs ~2 min on 24 symbols.
# S6 backtests were run as default-config single-point runs; results extracted from
# partial DBs (runs killed mid-year due to session constraint, results cover Jan-May 2025).
# Full-year sweep requires either a symbols-restricted cache copy or a --symbols CLI flag.
# See DEF-145 for the follow-up sweep task.
#
# micro_pullback: Partial backtest (Jan–May 2025, 24 symbols): 417 trades, WR=49.6%,
#   avg_R=0.0046. January alone looked strong (37 trades, WR=64.9%, avg_R=0.204) due to
#   IONQ's exceptional volatility. Normalised over 5 months the edge disappears. Default
#   config does not qualify (expectancy too low for Sharpe > 0.5). No qualifying variant
#   found. Promising on trending momentum phases; revisit with tighter min_impulse_percent
#   (0.03–0.04) when 24-symbol sweep infrastructure is available.
#
# vwap_bounce: Partial backtest (Jan–Feb 2025, 24 symbols): 154 trades, WR=40.3%,
#   avg_R=0.055, total_pnl=–$9,025. Positive expectancy in R-multiple terms but negative
#   dollar P&L. Low win rate on momentum stocks — VWAP bounce entries tend to get stopped
#   out more on high-beta names. No qualifying variant found. Pattern may benefit from a
#   tighter vwap_touch_tolerance_pct and min_prior_trend_bars >= 15 filter. Revisit with
#   24-symbol sweep.
#
# narrow_range_breakout: Partial backtest (Jan–Apr 2025): only 2 trades on the 24 target
#   symbols (avg_R=–0.031). The pattern generated 1,384 trades total (full universe) but
#   is highly selective on high-beta momentum names — volatility contraction followed by
#   a clean range expansion breakout rarely sets up cleanly on IONQ/MARA/RIOT style names.
#   No qualifying variant found. Consider testing on a mid-cap growth universe instead.

exit_sweep_params: null

variants:
  dip_and_rip:
    # v2: Tighter dip threshold + elevated volume confirmation + moderate target.
    # Rationale: Requires a more meaningful 3% dip (vs default 2%), ensures strong
    # volume on recovery (1.6x vs 1.3x default), and takes profit at 1.5x dip range.
    # Backtest (2025, 24 symbols): trades=114, Sharpe=1.996, expectancy=0.0443, WR=45.6%
    - variant_id: "strat_dip_and_rip__v2_tight_dip_quality"
      mode: "shadow"
      params:
        min_dip_percent: 0.03
        min_recovery_volume_ratio: 1.6
        target_ratio: 1.5

    # v3: High-conviction filter — strict dip threshold + strong volume surge.
    # Rationale: Pushes volume requirement to 2.0x (top quartile of recoveries)
    # and keeps 1.5x target. Fewer trades but highest Sharpe of any tested config.
    # Backtest (2025, 24 symbols): trades=40, Sharpe=2.628, expectancy=0.0683, WR=45.0%
    - variant_id: "strat_dip_and_rip__v3_strict_volume"
      mode: "shadow"
      params:
        min_dip_percent: 0.03
        min_recovery_volume_ratio: 2.0
        target_ratio: 1.5
  
  micro_pullback:
    # v2: Moderate impulse filter — best trade-count / edge-quality balance.
    # Rationale: Tightens min_impulse_percent from default 0.03 to 0.05 (requires
    # a more meaningful impulse move) and caps max_impulse_bars at 15 (vs default 20),
    # filtering out slow drifts that aren't true impulses.
    # Sweep (2025, 38 symbols): trades=658, WR=52.4%, avg_R=0.235, P&L=$116,813
    # Signal density: ~2.6 trades/symbol/year — deployable frequency.
    - variant_id: "strat_micro_pullback__v2_tight_impulse"
      mode: "shadow"
      params:
        min_impulse_percent: 0.05
        max_impulse_bars: 15

    # v3: Strict impulse filter — highest edge quality, fewer signals.
    # Rationale: Pushes min_impulse_percent to 0.06 (top quartile of impulse moves).
    # Same 15-bar cap. A/B pair with v2 to observe selectivity tradeoff in shadow.
    # Sweep (2025, 38 symbols): trades=298, WR=53.4%, avg_R=0.334, P&L=$76,863
    # Signal density: ~1.2 trades/symbol/year — highly selective.
    - variant_id: "strat_micro_pullback__v3_strict_impulse"
      mode: "shadow"
      params:
        min_impulse_percent: 0.06
        max_impulse_bars: 15

  hod_break:
    # v1: Tighter consolidation — hypothesis: narrower range before breakout
    # = higher quality setup. Reduces noise from wide-range chop.
    - variant_id: "strat_hod_break__v1_tight_consolidation"
      mode: "shadow"
      params:
        consolidation_max_range_atr: 0.5
        consolidation_min_bars: 8

    # v2: Volume conviction — higher breakout volume requirement filters
    # out low-conviction breaks that tend to fade.
    - variant_id: "strat_hod_break__v2_volume_conviction"
      mode: "shadow"
      params:
        min_breakout_volume_ratio: 2.0
        min_hold_bars: 3

    # v3: Combined tighter setup — both consolidation and volume filters.
    - variant_id: "strat_hod_break__v3_tight_and_volume"
      mode: "shadow"
      params:
        consolidation_max_range_atr: 0.5
        consolidation_min_bars: 8
        min_breakout_volume_ratio: 2.0

  gap_and_go:
    # v1: Defaults — first valid shadow test since DEF-152 fix.
    # Prior sweep results were all invalid due to degenerate stops.
    - variant_id: "strat_gap_and_go__v1_defaults"
      mode: "shadow"
      params:
        min_gap_percent: 3.0
        entry_mode: "first_pullback"

    # v2: Higher gap threshold — only strong 5%+ gappers.
    # Hypothesis: bigger gaps have more continuation momentum.
    - variant_id: "strat_gap_and_go__v2_big_gap"
      mode: "shadow"
      params:
        min_gap_percent: 5.0
        min_relative_volume: 2.5

    # v3: Direct breakout entry — enters on 5-min high break instead of
    # waiting for pullback. Faster entry, potentially more noise.
    - variant_id: "strat_gap_and_go__v3_direct_entry"
      mode: "shadow"
      params:
        min_gap_percent: 3.0
        entry_mode: "direct_breakout"

  premarket_high_break:
    # v1: Defaults — had Sharpe 2.788 in backtest but 0 live trades on Apr 2.
    # DEF-152 lookback/reference data now fixed. Needs live shadow validation.
    - variant_id: "strat_premarket_high_break__v1_defaults"
      mode: "shadow"
      params:
        min_pm_candles: 3
        min_breakout_volume_ratio: 1.5

    # v2: Stricter PM activity — requires more pre-market volume to filter
    # low-liquidity PM sessions that produce unreliable highs.
    - variant_id: "strat_premarket_high_break__v2_strict_pm"
      mode: "shadow"
      params:
        min_pm_volume: 25000.0
        min_breakout_volume_ratio: 2.0
        min_pm_candles: 5

  vwap_bounce:
    # v1: Defaults with new DEF-154 signal density controls.
    # Previous sweeps had 2-22 signals/symbol/day (useless).
    # New controls: min_approach_distance_pct, follow_through_bars, signal cap.
    - variant_id: "strat_vwap_bounce__v1_density_controlled"
      mode: "shadow"
      params:
        min_approach_distance_pct: 0.003
        min_bounce_follow_through_bars: 2
        min_prior_trend_bars: 15

    # v2: Stricter approach — price must be further above VWAP before
    # pullback counts, longer prior trend required. Fewer but higher
    # quality setups.
    - variant_id: "strat_vwap_bounce__v2_strict_approach"
      mode: "shadow"
      params:
        min_approach_distance_pct: 0.005
        min_prior_trend_bars: 20
        min_bounce_follow_through_bars: 3
        min_bounce_volume_ratio: 1.5

  narrow_range_breakout:
    # v1: Defaults — was "too selective" on momentum universe (2 trades
    # in 4 months). Larger universe (2,047 symbols) should produce more signals.
    - variant_id: "strat_narrow_range_breakout__v1_defaults"
      mode: "shadow"
      params:
        nr_lookback: 7
        consolidation_max_range_atr: 0.8

    # v2: Extended compression — longer lookback and more narrowing bars
    # required. Hypothesis: more established compression = stronger breakout.
    - variant_id: "strat_narrow_range_breakout__v2_deep_compression"
      mode: "shadow"
      params:
        nr_lookback: 10
        min_narrowing_bars: 5
        consolidation_max_range_atr: 0.6

  abcd:
    # v1: Defaults — near-zero edge (0.057 R) in small-sample sweep.
    # Shadow will determine if the pattern has any real edge.
    # Already in shadow mode at strategy level; this adds experiment tracking.
    - variant_id: "strat_abcd__v1_defaults"
      mode: "shadow"
      params:
        fib_b_min: 0.382
        fib_b_max: 0.618

    # v2: Golden zone — tighter Fibonacci retracement at B point.
    # Hypothesis: 50-61.8% retracements are higher quality than 38.2%.
    - variant_id: "strat_abcd__v2_golden_zone"
      mode: "shadow"
      params:
        fib_b_min: 0.50
        fib_b_max: 0.618
        leg_price_ratio_min: 0.9

  bull_flag:
    # v1: Defaults — dead on 24-symbol momentum universe, but untested on
    # the 793-symbol filtered universe. Shadow will tell us.
    - variant_id: "strat_bull_flag__v1_defaults"
      mode: "shadow"
      params:
        pole_min_move_pct: 0.03
        flag_max_bars: 20

    # v2: Strong pole — requires 5% pole move instead of 3%.
    # Hypothesis: bigger poles produce more reliable flags.
    - variant_id: "strat_bull_flag__v2_strong_pole"
      mode: "shadow"
      params:
        pole_min_move_pct: 0.05
        flag_max_bars: 15
        breakout_volume_multiplier: 1.5

  flat_top_breakout:
    # v1: Defaults — dead in sweeps but untested with proper universe.
    # Already in shadow at strategy level; this adds experiment tracking.
    - variant_id: "strat_flat_top_breakout__v1_defaults"
      mode: "shadow"
      params:
        resistance_touches: 3
        resistance_tolerance_pct: 0.002

    # v2: Stricter resistance — requires more touches and tighter tolerance.
    # Hypothesis: more confirmed resistance = stronger breakout signal.
    - variant_id: "strat_flat_top_breakout__v2_strict_resistance"
      mode: "shadow"
      params:
        resistance_touches: 4
        resistance_tolerance_pct: 0.001
        consolidation_min_bars: 15